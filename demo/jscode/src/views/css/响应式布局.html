<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Design Example</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }
      .container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background-color: #f1f1f1;
        padding: 20px;
        text-align: center;
      }
      .nav {
        display: flex;
        justify-content: space-around;
        background-color: #333;
        padding: 10px;
      }
      .nav a {
        color: white;
        text-decoration: none;
        padding: 10px;
      }
      .content {
        display: flex;
        flex-wrap: wrap;
        margin-top: 20px;
      }
      .column {
        flex: 1;
        min-width: 300px;
        padding: 20px;
        background-color: #e0e0e0;
        margin: 10px;
      }
      @media (max-width: 768px) {
        .content {
          flex-direction: column;
        }
        .column {
          min-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>My Responsive Website</h1>
      </div>
      <div class="nav">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </div>
      <div class="content">
        <div class="column">
          <h2>Column 1</h2>
          <p>This is the first column.</p>
        </div>
        <div class="column">
          <h2>Column 2</h2>
          <p>This is the second column.</p>
        </div>
      </div>
    </div>
  </body>
</html>
