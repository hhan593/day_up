<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>浮动影响布局示例</title>
    <style>
      .container {
        border: 1px solid black;
        padding: 10px;
        height: 300px;
      }
      .box {
        width: 100px;
        height: 100px;
        margin: 10px;
        background-color: lightblue;
      }
      .float-left {
        float: left;
      }
      .float-right {
        float: right;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box float-left">Box 1</div>
      <div class="box float-right">Box 2</div>
      <div class="box">Box 3</div>
    </div>
  </body>
</html>
