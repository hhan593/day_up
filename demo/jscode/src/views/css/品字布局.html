<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>品字布局 - Flexbox</title>
    <style>
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        border: 1px solid #000;
      }
      .top {
        width: 100%;
        height: 200px;
        background-color: #f1f1f1;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .bottom {
        display: flex;
        width: 100%;
      }
      .bottom div {
        margin-top: 20px;
        width: 50%;
        height: 150px;

        display: flex;
        justify-content: center;
        align-items: center;
      }
      .bottom .left {
        background-color: #ddd;
      }
      .bottom .right {
        margin-left: 20px;
        background-color: #bbb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top">Top</div>
      <div class="bottom">
        <div class="left">Left</div>
        <div class="right">Right</div>
      </div>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>品字布局 - Grid</title>
    <style>
      .container {
        display: grid;
        grid-template-rows: 200px 150px;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        border: 1px solid #000;
      }
      .top {
        grid-row: 1 / 2;
        grid-column: 1 / 3;
        background-color: #f1f1f1;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .left {
        grid-row: 2 / 3;
        grid-column: 1 / 2;
        background-color: #ddd;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .right {
        grid-row: 2 / 3;
        grid-column: 2 / 3;
        background-color: #bbb;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top">Top</div>
      <div class="left">Left</div>
      <div class="right">Right</div>
    </div>
  </body>
</html>
