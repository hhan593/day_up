<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Font Size with Transform Example</title>
    <style>
      body {
        font-size: 16px; /* 默认字体大小 */
      }

      .scaled-text {
        transform: scale(0.625); /* 10px / 16px = 0.625 */
        transform-origin: top left; /* 保持元素的左上角不变 */
      }
    </style>
  </head>
  <body>
    <div class="scaled-text">
      <h1>Hello, World!</h1>
      <p>This is a paragraph with 10px font size using transform scale.</p>
    </div>
    <div>
      <a href="./float.html" style="background-color: skyblue"
        >55555555555555555555</a
      >
    </div>
  </body>
</html>
