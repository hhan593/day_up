<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        width: 100%;

        height: 100%;
        display: flex;
        align-items: start;
        justify-content: start;
        flex-direction: row;
      }
      .box1 {
        width: 20%;
        height: 20vw;
        background-color: tomato;
      }
      .box2 {
        width: 20%;
        height: 0;
        padding-top: 20%;
        background-color: orange;
      }
      .box3 {
        width: 20%;
        overflow: hidden;
        background-color: yellow;
      }
      .box3::after {
        content: "";
        display: block;
        margin-top: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box1">利用vw来实现，vw是相对于视图窗口的高度</div>
      <div class="box2">
        <!-- 利用元素的margin/padding百分比是相对父元素width的性质来实现 -->
      </div>
      <div class="box3"></div>
    </div>
  </body>
</html>
