<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Margin and Padding Example</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      .outer-box {
        width: 300px;
        height: 300px;
        background-color: lightgray;
        margin: 50px; /* 在外侧添加50px的空白区域，不包含背景色 */
        border: 2px solid black;
      }

      .inner-box {
        width: 200px;
        height: 200px;
        background-color: lightblue;
        padding: 20px; /* 在内侧添加20px的空白区域，包含背景色 */
        border: 2px solid red;
      }
    </style>
  </head>
  <body>
    <div class="outer-box">
      <div class="inner-box">Content</div>
    </div>
  </body>
</html>
