      const createBrowserFingerprint = () => {
        const canvas = document.createElement("canvas");

        ctx.fillRect(0, 0, 100, 100);
        return canvas.toDataURL();
      };
      const ws = new WebSocket("ws://localhost:3000");

        ws.send(
