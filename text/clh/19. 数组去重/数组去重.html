<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=sc, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function unique(arr) {
        // 使用Set数据结构对数组进行去重，Set只会存储唯一的值
        const res = new Set(arr);
        // 将Set转换为数组并返回
        return [...res];
      }
      console.log(unique([1, 1, 2, 2, 3, 3]));
    </script>
  </body>
</html>
