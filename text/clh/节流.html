<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #layout {
        width: 200px;
        height: 200px;
        background-color: pink;
      }
    </style>
  </head>

  <body>
    <script>
      // 初始化计数器
      let count = 0;
      // 获取HTML中id为'layout'的节点
      var node = document.getElementById("layout");

      /**
       * 用户点击事件处理函数
       * @param {MouseEvent} e - 触发的鼠标事件
       */
      function getUserAction(e) {
        // 打印当前节点和事件对象
        console.log(this, e); // 分别打印：node 这个节点 和 MouseEvent
        // 更新节点的HTML内容为递增的计数
        node.innerHTML = count++;
      }

      // 设置节点的点击事件处理函数，使用节流函数限制触发频率
      node.onclick = throttle(getUserAction, 1000);

      /**
       * 节流函数，用于限制函数执行的频率
       * @param {Function} fn - 需要被限制执行频率的函数
       * @param {number} delay - 执行间隔时间（毫秒）
       * @returns {Function} - 返回一个新的节流函数
       */
      function throttle(fn, delay) {
        var timer;
        return function () {
          if (timer) return false;
          fn.apply(this, arguments);
          timer = setTimeout(() => {
            clearTimeout(timer);
            timer = null;
          }, delay);
        };
      }

      /**
       * 节流函数的另一种实现方式，通过时间戳来限制函数执行的频率
       * @param {Function} func - 需要被限制执行频率的函数
       * @param {number} wait = 50 - 执行间隔时间（毫秒），默认为50毫秒
       * @returns {Function} - 返回一个新的节流函数
       */
      function throttle(func, wait = 50) {
        let lastTime = 0;
        return function (...args) {
          let now = +new Date();
          if (now - lastTime > wait) {
            lastTime = now;
            func.apply(this, args);
          }
        };
      }
    </script>
  </body>
</html>
