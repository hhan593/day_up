<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  html,
  body {
    border: 0;
    margin:0;
    padding:0;
  }
  body{
    /* width: 100%; */
  }
  .box  {
    display: flex;
    justify-content: center;
    align-content: center;
    flex-wrap: wrap;
    margin:0 auto;
    width: 300px;
    height: 300px;
    background-color: aqua;
  }
  .box div{
    width: 100px;
    height:100px;
    color:aqua;
    background-color: red;
    line-height: 100px;
    text-align: center;
  }
  .box div:nth-child(2n+1){
    background-color: green;
  }
</style>
<body>
<div class="box">
  <div>1</div>
  <div>1</div>
  <div>1</div>
  <div>1</div>
  <div>1</div>
  <div>1</div>
  <div>1</div>
  <div>1</div>
  <div>1</div>
</div>
</body>

</html>
